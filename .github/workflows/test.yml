name: CI pipeline

on:
  push:
    branches: [ main, mediapipe, dev ]
  pull_request:
    branches: [ main, mediapipe ]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vue-next
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vue-next/package-lock.json

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: vue-next/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('vue-next/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: vue-next/dist
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test


      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            vue-next/test-results/
          retention-days: 30

      - name: Generate test statistics
        run: |
          echo "## Test Statistics" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: ✅ Completed" >> $GITHUB_STEP_SUMMARY
          if [ -d "coverage" ]; then
            echo "- Coverage reports generated" >> $GITHUB_STEP_SUMMARY
          fi


          
  superlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Super-Linter
        uses: actions/cache@v4
        with:
          path: ~/.cache/super-linter
          key: ${{ runner.os }}-super-linter-${{ hashFiles('**/*.js', '**/*.vue', '**/*.ts') }}
          restore-keys: |
            ${{ runner.os }}-super-linter-

      - name: Run Super-Linter
        uses: github/super-linter@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: main
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_JAVASCRIPT_ES: true
          VALIDATE_JAVASCRIPT_STANDARD: true
          VALIDATE_TYPESCRIPT_ES: true
          VALIDATE_VUE: true
          VALIDATE_CSS: true
          VALIDATE_HTML: true
          LINTER_RULES_PATH: /
          FILTER_REGEX_INCLUDE: .*vue-next/src/.* 
          FILTER_REGEX_EXCLUDE: .*vue-next/tests/.* #  Exclude tests

  backend-runtime-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install smoke script deps
        run: python -m pip install --upgrade pip requests

      - name: Start runtime-split stack
        run: |
          USE_RUNTIME_SERVICES=true USE_WORKER_LIBRARY=true \
          docker compose -f docker-compose.dev.yml --profile runtime-split up -d --build

      - name: Wait for backend and runtime services
        run: |
          set -euo pipefail
          for url in \
            "http://localhost:8000/health" \
            "http://localhost:8091/health" \
            "http://localhost:8092/health" \
            "http://localhost:8093/health"
          do
            echo "Waiting for ${url}"
            for i in {1..60}; do
              if curl -fsS "$url" >/dev/null; then
                echo "Healthy: ${url}"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "Timed out waiting for ${url}" >&2
                exit 1
              fi
              sleep 2
            done
          done

      - name: Run playground runtime smoke test
        run: python backend/scripts/smoke_playground_runtime.py --base-url http://localhost:8000

      - name: Dump compose logs on failure
        if: failure()
        run: |
          mkdir -p artifacts
          docker compose -f docker-compose.dev.yml --profile runtime-split logs --no-color | tee artifacts/backend-runtime-smoke.log

      - name: Upload runtime smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-runtime-smoke-logs
          path: artifacts/backend-runtime-smoke.log
          retention-days: 14

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.dev.yml --profile runtime-split down -v --remove-orphans
