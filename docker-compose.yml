services:
  frontend:
    build: 
      context: ./vue-next
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    privileged: true
    ports:
      - "8000:8080"
    user: "0:0"
    device_cgroup_rules:
      - "c 166:* rmw"
      - "c 188:* rmw"
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017}
      - DB_NAME=${DB_NAME:-sign_glove}
      - TTS_PROVIDER=gtts
      - BACKEND_BASE_URL=http://localhost:8080
      - SERIAL_PORT_SINGLE=/dev/ttyACM0
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - /dev:/dev
      - ./backend/data:/app/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
