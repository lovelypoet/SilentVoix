services:
  frontend:
    build:
      context: ./vue-next
      dockerfile: Dockerfile.dev
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./vue-next:/app
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      args:
        BACKEND_REQUIREMENTS: requirements-api.txt
    env_file:
      - ./backend/.env
    privileged: true
    ports:
      - "8000:8080"
    user: "0:0"
    device_cgroup_rules:
      - "c 166:* rmw"
      - "c 188:* rmw"
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017}
      - DB_NAME=${DB_NAME:-sign_glove}
      - TTS_PROVIDER=gtts
      - BACKEND_BASE_URL=http://localhost:8080
      - SERIAL_PORT_SINGLE=/dev/ttyACM0
      - USE_RUNTIME_SERVICES=${USE_RUNTIME_SERVICES:-true}
      - ML_TENSORFLOW_URL=${ML_TENSORFLOW_URL:-http://ml-tensorflow:8091}
      - ML_PYTORCH_URL=${ML_PYTORCH_URL:-http://ml-pytorch:8092}
      - USE_WORKER_LIBRARY=${USE_WORKER_LIBRARY:-true}
      - WORKER_LIBRARY_URL=${WORKER_LIBRARY_URL:-http://worker-library:8093}
      - USE_FUSION_PREPROCESS_WORKER=${USE_FUSION_PREPROCESS_WORKER:-true}
      - FUSION_PREPROCESS_WORKER_URL=${FUSION_PREPROCESS_WORKER_URL:-http://worker-fusion-preprocess:8094}
    depends_on:
      mongo:
        condition: service_healthy
      ml-tensorflow:
        condition: service_healthy
      ml-pytorch:
        condition: service_healthy
      worker-library:
        condition: service_healthy
      worker-fusion-preprocess:
        condition: service_healthy
    volumes:
      - /dev:/dev
      - ./backend/data:/app/data
      - ./backend/AI/model_library:/app/AI/model_library

  ml-tensorflow:
    build: ./ml-tensorflow
    ports:
      - "8091:8091"
    volumes:
      - ./backend/AI/model_library:/shared/model_library:ro
      - ./backend/AI:/shared/AI:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8091/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  ml-pytorch:
    build: ./ml-pytorch
    ports:
      - "8092:8092"
    volumes:
      - ./backend/AI/model_library:/shared/model_library:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8092/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  worker-library:
    build: ./worker-library
    ports:
      - "8093:8093"
    environment:
      - MODEL_LIBRARY_DIR=/app/AI/model_library
      - WORKER_RECONCILE_INTERVAL_SEC=300
      - WORKER_RECONCILE_PRUNE_MISSING=false
      - WORKER_RECONCILE_APPLY_ON_STARTUP=true
    volumes:
      - ./backend/AI/model_library:/app/AI/model_library
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8093/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  worker-fusion-preprocess:
    build: ./worker-fusion-preprocess
    ports:
      - "8094:8094"
    environment:
      - FUSION_PREPROCESS_JOB_DIR=/app/data/fusion_preprocess_jobs
    volumes:
      - ./backend/data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8094/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
