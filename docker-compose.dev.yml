services:
  frontend:
    build:
      context: ./vue-next
      dockerfile: Dockerfile.dev
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      args:
        BACKEND_REQUIREMENTS: requirements-api.txt
    env_file:
      - ./backend/.env
    privileged: true
    ports:
      - "8000:8080"
    user: "0:0"
    device_cgroup_rules:
      - "c 166:* rmw"
      - "c 188:* rmw"
    environment:
      - MONGO_URI=mongodb+srv://namanh14122005:test123@signglove-cluster.2fgsv8h.mongodb.net/sign_glove?retryWrites=true&w=majority
      - DB_NAME=sign_glove
      - TTS_PROVIDER=gtts
      - BACKEND_BASE_URL=http://localhost:8080
      - SERIAL_PORT_SINGLE=/dev/ttyACM0
    volumes:
      - /dev:/dev
      - ./backend/data:/app/data
      - ./backend/AI/model_library:/app/AI/model_library

  ml-tensorflow:
    profiles: ["tf", "runtime-split", "full"]
    build: ./ml-tensorflow
    ports:
      - "8091:8091"
    volumes:
      - ./backend/AI/model_library:/shared/model_library:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8091/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  ml-pytorch:
    profiles: ["torch", "runtime-split", "full"]
    build: ./ml-pytorch
    ports:
      - "8092:8092"
    volumes:
      - ./backend/AI/model_library:/shared/model_library:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8092/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  worker-library:
    profiles: ["worker", "runtime-split", "full"]
    build: ./worker-library
    ports:
      - "8093:8093"
    environment:
      - MODEL_LIBRARY_DIR=/app/AI/model_library
      - WORKER_RECONCILE_INTERVAL_SEC=300
      - WORKER_RECONCILE_PRUNE_MISSING=false
      - WORKER_RECONCILE_APPLY_ON_STARTUP=true
    volumes:
      - ./backend/AI/model_library:/app/AI/model_library
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8093/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
