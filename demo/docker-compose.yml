version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_HOST=backend
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    depends_on:
      - backend
